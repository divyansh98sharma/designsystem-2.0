<!--
  Loads the Inter webfont for Storybook foundation specimens only.
  The @ecw/design-system library does NOT bundle or load fonts — it only
  references the `--ecw-typography-font-family-*` token. Consuming apps are
  responsible for loading the Inter font family themselves.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<!--
  No Material Symbols webfont: <ecw-icon> renders inline SVGs (no glyph).
  Material and Healthicons SVGs are fetched live from the jsDelivr CDN at
  runtime; preconnect to speed up the first request.
-->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
