<!--
  Loads the Inter webfont for Storybook foundation specimens only.
  The @ecw/design-system library does NOT bundle or load fonts — it only
  references the `--ecw-typography-font-family-*` token. Consuming apps are
  responsible for loading the Inter font family themselves.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<!--
  Material Symbols webfont for the ecw-icon component (Foundations/Icons, PE-315893).
  Like Inter, the library does NOT bundle this font — consuming apps load it.
-->
<link
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
  rel="stylesheet"
/>
